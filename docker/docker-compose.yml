version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cuhp-ctf-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: cuhp_ctf
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: cuhp-ctf-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/cuhp_ctf?authSource=admin
      JWT_SECRET: your_jwt_secret_here
    depends_on:
      - mongodb

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: cuhp-ctf-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongodb_data:
